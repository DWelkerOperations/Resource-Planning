name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stable
        uses: actions/checkout@v4
        with:
          ref: main
          path: stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: stable/pnpm-lock.yaml

      - name: Install stable dependencies
        working-directory: stable
        run: pnpm install --frozen-lockfile

      - name: Typecheck stable
        working-directory: stable
        run: pnpm typecheck

      - name: Lint stable
        working-directory: stable
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then
            pnpm lint
          else
            echo "No stable lint script; skipping."
          fi

      - name: Production dependency audit stable
        working-directory: stable
        run: |
          if node -e "process.exit(require('./package.json').scripts?.['security:audit'] ? 0 : 1)"; then
            pnpm security:audit
          else
            echo "No stable security:audit script; skipping."
          fi

      - name: Test stable
        working-directory: stable
        run: pnpm test

      - name: Build stable
        working-directory: stable
        run: pnpm build
        env:
          GITHUB_PAGES: "true"

      - name: Assemble Pages artifact
        run: |
          mkdir -p public-site
          cp -R stable/dist/. public-site/

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
