name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - v1.1Beta
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stable
        uses: actions/checkout@v4
        with:
          ref: main
          path: stable

      - name: Check for beta branch
        id: beta
        run: |
          if git ls-remote --exit-code --heads https://github.com/${{ github.repository }}.git v1.1Beta >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout beta
        if: steps.beta.outputs.exists == 'true'
        uses: actions/checkout@v4
        with:
          ref: v1.1Beta
          path: beta

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: stable/pnpm-lock.yaml

      - name: Install stable dependencies
        working-directory: stable
        run: pnpm install --frozen-lockfile

      - name: Typecheck stable
        working-directory: stable
        run: pnpm typecheck

      - name: Lint stable
        working-directory: stable
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then
            pnpm lint
          else
            echo "No stable lint script; skipping."
          fi

      - name: Production dependency audit stable
        working-directory: stable
        run: |
          if node -e "process.exit(require('./package.json').scripts?.['security:audit'] ? 0 : 1)"; then
            pnpm security:audit
          else
            echo "No stable security:audit script; skipping."
          fi

      - name: Test stable
        working-directory: stable
        run: pnpm test

      - name: Build stable
        working-directory: stable
        run: pnpm build
        env:
          GITHUB_PAGES: "true"

      - name: Install beta dependencies
        if: steps.beta.outputs.exists == 'true'
        working-directory: beta
        run: pnpm install --frozen-lockfile

      - name: Typecheck beta
        if: steps.beta.outputs.exists == 'true'
        working-directory: beta
        run: pnpm typecheck

      - name: Lint beta
        if: steps.beta.outputs.exists == 'true'
        working-directory: beta
        run: pnpm lint

      - name: Production dependency audit beta
        if: steps.beta.outputs.exists == 'true'
        working-directory: beta
        run: pnpm security:audit

      - name: Test beta
        if: steps.beta.outputs.exists == 'true'
        working-directory: beta
        run: pnpm test

      - name: Build beta
        if: steps.beta.outputs.exists == 'true'
        working-directory: beta
        run: pnpm build
        env:
          GITHUB_PAGES: "true"
          APP_BASE_PATH: "/Dispatch-Tool/v1.1Beta/"

      - name: Assemble Pages artifact
        run: |
          mkdir -p public-site
          cp -R stable/dist/. public-site/
          if [ "${{ steps.beta.outputs.exists }}" = "true" ]; then
            mkdir -p public-site/v1.1Beta
            cp -R beta/dist/. public-site/v1.1Beta/
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
